<!DOCTYPE html>
<html>
<head>
    <title>SecureBank Login</title>
    <style>
        body { font-family: Arial; background: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #16213e; padding: 40px; border-radius: 8px; width: 320px; }
        h2 { color: #0f3460; text-align: center; color: #e94560; }
        input { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; border-radius: 4px; border: none; }
        button { width: 100%; padding: 10px; background: #e94560; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .error { color: #ff6b6b; font-size: 0.9em; }
        .hint { color: #aaa; font-size: 0.8em; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🏦 SecureBank</h2>
        <p style="text-align:center; color:#aaa;">Employee Portal Login</p>
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        <div id="hints">
    <p class="hint" id="hint1" style="display:none">💡 Hint 1: What happens if you put a single quote <code>'</code> in the username field?</p>
    <p class="hint" id="hint2" style="display:none">💡 Hint 2: SQL queries can be commented out using <code>--</code></p>
    <p class="hint" id="hint3" style="display:none">💡 Hint 3: Try making the WHERE condition always true using <code>OR</code></p>
    <button onclick="showHint()" style="margin-top:10px; background:#0f3460; color:white; border:none; padding:8px 16px; border-radius:4px; cursor:pointer">Get a Hint</button>
</div>

<script>
    let currentHint = 0;
    const hints = ['hint1', 'hint2', 'hint3'];
    function showHint() {
        if (currentHint < hints.length) {
            document.getElementById(hints[currentHint]).style.display = 'block';
            currentHint++;
        }
    }
</script>
    </div>
</body>
</html>
